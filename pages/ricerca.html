<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ricerca | Skyy History</title>
  <meta name="description" content="Ricerca globale dentro pagine, film, ricette, fonti, timeline e mappe.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/site-order.css">
  <link rel="stylesheet" href="../styles/films.css">
  <link rel="stylesheet" href="../styles/tools.css">
</head>
<body>
  <nav class="war-navbar"></nav>
  <main id="contenuto">

    <section class="tool-hero page-band">
      <div class="container">
        <p class="section-kicker">Ricerca</p>
        <h1>Trova subito pagine, film, ricette e fonti</h1>
        <p>Indice locale leggero: funziona sui dataset JSON del progetto, senza database e senza appesantire il frontend.</p>
        <div class="tool-hero-stats">
          <article>
            <strong>6</strong>
            <span>aree</span>
          </article>
          <article>
            <strong>JSON</strong>
            <span>dataset</span>
          </article>
          <article>
            <strong>ridotto</strong>
            <span>lag</span>
          </article>
        </div>
      </div>
    </section>
    <section class="page-band tool-section" data-search-page>
      <div class="container">
        <div class="search-panel">
          <label for="globalSearch">Cerca nel sito</label>
          <input id="globalSearch" type="search" placeholder="Esempio: borshch, Bucha, Crimea, film, ricostruzione" autocomplete="off">
          <select id="globalSearchType" aria-label="Tipo di risultato">
            <option value="all">Tutto</option>
            <option value="pagina">Pagine</option>
            <option value="film">Film</option>
            <option value="ricetta">Ricette</option>
            <option value="fonte">Fonti</option>
            <option value="timeline">Timeline</option>
            <option value="mappa">Mappe</option>
          </select>
        </div>
        <div class="search-results" data-search-results aria-live="polite"></div>
      </div>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/script.js"></script>
  <script src="../scripts/site-tools.js"></script>
</body>
</html>
